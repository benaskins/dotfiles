# ~/.tmux.conf — muscle memory

set -sg escape-time 0
set -g prefix C-a
unbind C-b
bind C-a send-prefix
unbind r
bind r source-file ~/.tmux.conf
set -g base-index 1
set -g pane-base-index 1
unbind ^A
bind ^A select-pane -t :.+
setw -g mode-keys vi
set -g status-keys vi
setw -g main-pane-width 132
setw -g main-pane-height 55

# Auto-name windows after the current directory basename
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}:#{?#{m:*.*.*,#{pane_current_command}},claude,#{b:pane_current_command}}'

# Host-aware status bar colors
%if "#{==:#{host_short},hestia}"
set -g status-style "bg=colour208,fg=black"
set -g status-left "#[bold] hestia #[nobold]│ [#{session_name}] "
%elif "#{==:#{host_short},limen}"
set -g status-style "bg=colour30,fg=white"
set -g status-left "#[bold] limen #[nobold]│ [#{session_name}] "
%else
set -g status-style "bg=green,fg=black"
set -g status-left "#[bold] #{host_short} #[nobold]│ [#{session_name}] "
%endif
set -g status-left-length 30
set -g status-right " %H:%M %d-%b-%y "
